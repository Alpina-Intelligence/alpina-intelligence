name: Deploy underscore-backend

on:
  push:
    branches: [main]
    paths:
      - "projects/underscore/backend/**"
      - "projects/underscore/shared/**"
      - "projects/underscore/package.json"
      - "projects/underscore/bun.lock"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/underscore-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./projects/underscore
          file: ./projects/underscore/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Copy infra files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "infra/docker-compose.yml,infra/ensure-databases.sql"
          target: "/opt/alpina"
          strip_components: 1
          overwrite: true

      - name: Deploy underscore-backend
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_SHA
          script: |
            set -euo pipefail
            cd /opt/alpina
            if grep -q '^UNDERSCORE_BACKEND_TAG=' .env; then
              sed -i "s|^UNDERSCORE_BACKEND_TAG=.*|UNDERSCORE_BACKEND_TAG=${GITHUB_SHA}|" .env
            else
              echo "UNDERSCORE_BACKEND_TAG=${GITHUB_SHA}" >> .env
            fi
            PG_USER="$(grep ^POSTGRES_USER .env | cut -d= -f2)"
            docker compose up -d db
            until docker compose exec -T db pg_isready -U "$PG_USER" >/dev/null 2>&1; do sleep 1; done
            docker compose exec -T db psql -U "$PG_USER" -d postgres -f /docker-entrypoint-initdb.d/init.sql
            docker compose pull underscore-backend
            docker compose up -d underscore-backend
