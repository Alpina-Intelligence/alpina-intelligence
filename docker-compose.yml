services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alpina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alpina_dev}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alpina}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.0
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MLFLOW_BACKEND_STORE_URI: postgresql://${POSTGRES_USER:-alpina}:${POSTGRES_PASSWORD:-alpina_dev}@db:5432/mlflow
      MLFLOW_ARTIFACTS_DESTINATION: /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "pip install --no-cache-dir psycopg2-binary &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://${POSTGRES_USER:-alpina}:${POSTGRES_PASSWORD:-alpina_dev}@db:5432/mlflow
      --artifacts-destination /mlflow/artifacts"

volumes:
  postgres_data:
  mlflow_artifacts:
